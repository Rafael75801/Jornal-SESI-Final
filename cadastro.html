<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/login-cadastro.css">
    <link rel="stylesheet" href="src/styles/root.css">
    <title>Jornal SESI | Registro</title>
</head>

<body>
    <main class="main">

        <button id="themeToggle" class="theme-btn">
            🌙
        </button>

        <div class="card hidden" id="mensagem-login">
            <div class="mensagem">
                <div class="icone">
                    <svg stroke="#00897B" width="800px" height="800px" viewBox="0 0 32 32" version="1.1"
                        xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                        <g id="icomoon-ignore">
                        </g>
                        <path
                            d="M16 2.672c-7.361 0-13.328 5.967-13.328 13.328s5.968 13.328 13.328 13.328c7.361 0 13.328-5.967 13.328-13.328s-5.967-13.328-13.328-13.328zM16 28.262c-6.761 0-12.262-5.501-12.262-12.262s5.5-12.262 12.262-12.262c6.761 0 12.262 5.501 12.262 12.262s-5.5 12.262-12.262 12.262z"
                            fill="#000000">
                        </path>
                        <path
                            d="M22.667 11.241l-8.559 8.299-2.998-2.998c-0.312-0.312-0.818-0.312-1.131 0s-0.312 0.818 0 1.131l3.555 3.555c0.156 0.156 0.361 0.234 0.565 0.234 0.2 0 0.401-0.075 0.556-0.225l9.124-8.848c0.317-0.308 0.325-0.814 0.018-1.131-0.309-0.318-0.814-0.325-1.131-0.018z"
                            fill="#000000">
                        </path>
                    </svg>
                </div>
                <h1>Login feito com sucesso!</h1>
            </div>
        </div>
        <div class="card">
            <div class="header-card">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                        <circle cx="12" cy="7" r="4" />
                    </svg>
                </div>
                <h1>Criar conta</h1>
                <p>Preencha os dados para se registrar</p>
            </div>

            <form id="formulario" novalidate>
                <div class="formulario-grid">
                    <div class="field">
                        <label for="nome">Nome Completo</label>
                        <input id="nome" type="text" placeholder="Seu nome" autocomplete="name" />
                    </div>

                    <div class="field">
                        <label for="cpf">CPF</label>
                        <input id="cpf" type="text" placeholder="000.000.000-00" maxlength="14" inputmode="numeric">
                    </div>

                    <div class="field">
                        <label for="email">E-mail</label>
                        <input id="email" type="email" placeholder="nome@email.com" autocomplete="email">
                    </div>

                    <div class="field">
                        <label for="tel">Telefone</label>
                        <input id="tel" type="tel" placeholder="(11) 99999-9999" inputmode="numeric" maxlength="15">
                    </div>
                </div>

                <button type="submit" class="btn-registro">
                    <svg viewBox="0 0 24 24">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                        <line x1="19" y1="8" x2="19" y2="14" />
                        <line x1="22" y1="11" x2="16" y2="11" />
                    </svg>
                    Registrar
                </button>
            </form>

            <div class="footer-card">
                <span>Já tem uma conta?</span>
                <a href="login.html">Entrar</a>
            </div>
        </div>
    </main>

    <script src="src/scripts/global.js"></script>
    <script src="src/scripts/scripts login/cadastro.js"></script>
</body>

</html>
